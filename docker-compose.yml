version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: credi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credi_password}
      POSTGRES_DB: ${POSTGRES_DB:-credi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: credi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
